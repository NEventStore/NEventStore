version: 1.0.{build}
image: Visual Studio 2022
configuration: Release
assembly_info:
  patch: true
  file: '**\AssemblyInfo.*'
  assembly_version: '{version}'
  assembly_file_version: '{version}'
  assembly_informational_version: '{version}'
dotnet_csproj:
  patch: true
  file: '**\*.csproj'
  version: '{version}'
  version_prefix: '{version}'
  package_version: '{version}'
  assembly_version: '{version}'
  file_version: '{version}'
  informational_version: '{version}'
install:
- ps: >-
    $dotnetInstall = Join-Path $env:TEMP 'dotnet-install.ps1'

    Invoke-WebRequest 'https://dot.net/v1/dotnet-install.ps1' -OutFile $dotnetInstall

    & $dotnetInstall -Channel 10.0 -Quality preview -InstallDir "$env:USERPROFILE\.dotnet"

    if ($LASTEXITCODE -ne 0) {
      throw 'Failed to install .NET 10 preview SDK.'
    }

    $env:PATH = "$env:USERPROFILE\.dotnet;$env:PATH"

    [Environment]::SetEnvironmentVariable('PATH', $env:PATH, 'Process')

    dotnet --list-sdks
- ps: dotnet tool restore
before_build:
- ps: >-
    # Display SDK information

    dotnet --info

    # Display minimal restore text

    dotnet restore ./src/NEventStore.Core.sln --verbosity m

    dotnet tool run dotnet-gitversion /l console /output buildserver /updateAssemblyInfo
build: off
build_script:
- ps: dotnet build ./src/NEventStore.Core.sln -c $env:CONFIGURATION --no-restore -p:ContinuousIntegrationBuild=True
after_build:
- ps: >-
    dotnet pack ./src/NEventStore/NEventStore.Core.csproj -c $env:CONFIGURATION --no-build -o artifacts /p:PackageVersion=$env:GitVersion_SemVer

    dotnet pack ./src/NEventStore.PollingClient/NEventStore.PollingClient.csproj -c $env:CONFIGURATION --no-build -o artifacts /p:PackageVersion=$env:GitVersion_SemVer

    dotnet pack ./src/NEventStore.Serialization.Json/NEventStore.Serialization.Json.Core.csproj -c $env:CONFIGURATION --no-build -o artifacts /p:PackageVersion=$env:GitVersion_SemVer

    dotnet pack ./src/NEventStore.Serialization.Bson/NEventStore.Serialization.Bson.Core.csproj -c $env:CONFIGURATION --no-build -o artifacts /p:PackageVersion=$env:GitVersion_SemVer

    dotnet pack ./src/NEventStore.Serialization.MsgPack/NEventStore.Serialization.MsgPack.Core.csproj -c $env:CONFIGURATION --no-build -o artifacts /p:PackageVersion=$env:GitVersion_SemVer

    dotnet pack ./src/NEventStore.Serialization.Binary/NEventStore.Serialization.Binary.Core.csproj -c $env:CONFIGURATION --no-build -o artifacts /p:PackageVersion=$env:GitVersion_SemVer
test: off
test_script:
- ps: dotnet test ./src/NEventStore.Core.sln -c $env:CONFIGURATION --no-build
artifacts:
- path: '**\artifacts\**\*.*'
deploy: off